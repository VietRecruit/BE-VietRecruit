services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: prod
        APP_VERSION: ${DOCKER_APP_VERSION:-0.0.1}
    image: ${DOCKER_USERNAME}/vietrecruit:${DOCKER_APP_VERSION:-latest}
    container_name: vr-app
    ports:
      - "8080:8080"
    networks:
      - vr-network
    environment:
      ACTIVE_PROFILE: prod
      POSTGRES_URL: jdbc:postgresql://vr-postgres:5432/vietrecruit
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: vr-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL}
      JWT_ISSUER: ${JWT_ISSUER}
      SERVER_PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: vr-kafka:9092
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ELASTICSEARCH_URI: http://vr-elasticsearch:9200
      LOKI_URL: http://vr-loki:3100/loki/api/v1/push
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID}
      PAYOS_API_KEY: ${PAYOS_API_KEY}
      PAYOS_CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY}
      PAYOS_LOG_LEVEL: ${PAYOS_LOG_LEVEL}
      PAYOS_RETURN_URL: ${PAYOS_RETURN_URL}
      PAYOS_CANCEL_URL: ${PAYOS_CANCEL_URL}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx2g"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  db:
    image: pgvector/pgvector:pg16
    container_name: vr-postgres
    environment:
      POSTGRES_DB: vietrecruit
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "max_replication_slots=4"
    ports: [ "5432:5432" ]
    networks:
      - vr-network
    volumes: [ "db:/var/lib/postgresql/data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d vietrecruit" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: vr-redis
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    networks:
      - vr-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: vr-kafka
    ports:
      - "29092:29092"
    networks:
      - vr-network
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@vr-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://vr-kafka:9092,CONTROLLER://vr-kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://vr-kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 'VlJDbHVzdGVySWQxMjM0NQ'
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: "-Xms1g -Xmx4g"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka-ui:
    container_name: vr-kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - 8090:8080
    networks:
      - vr-network
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: vr-kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://vr-debezium-connect:8083
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: ${KAFKA_UI_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${KAFKA_UI_PASSWORD}
    depends_on:
      - kafka
      - debezium-kafka-connect

  debezium-kafka-connect:
    image: debezium/connect:2.5
    container_name: vr-debezium-connect
    ports:
      - "127.0.0.1:8083:8083"
      - "127.0.0.1:8778:8778"
    networks:
      - vr-network
    environment:
      BOOTSTRAP_SERVERS: vr-kafka:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      ENABLE_JOLOKIA: "true"
    depends_on:
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  debezium-ui:
    image: debezium/debezium-ui:2.5
    container_name: vr-debezium-ui
    hostname: debezium-ui
    ports:
      - "127.0.0.1:8085:8080"
    networks:
      - vr-network
    environment:
      KAFKA_CONNECT_URIS: http://vr-debezium-connect:8083
    depends_on:
      - debezium-kafka-connect

  init-kafka-connect:
    build:
      context: ./debezium
    image: vr-init-connector:latest
    container_name: vr-init-kafka-connect
    networks:
      - vr-network
    environment:
      KAFKA_CONNECT_URL: http://vr-debezium-connect:8083
      CONNECTOR_CONFIG: /config/connector-postgres.json
      MAX_RETRIES: 60
      RETRY_INTERVAL: 5
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vietrecruit

    depends_on:
      debezium-kafka-connect:
        condition: service_healthy
    restart: "no"

  prometheus:
    image: prom/prometheus:latest
    container_name: vr-prometheus
    user: root
    restart: unless-stopped
    volumes:
      - ./monitor/prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "9091:9090"
    networks:
      - vr-network

  grafana:
    image: grafana/grafana
    container_name: vr-grafana
    user: root
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SING_UP=false
      - GF_SERVER_DOMAIN=localhost
    volumes:
      - ./grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - vr-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: vr-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"
    networks:
      - vr-network

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: vr-redis-exporter
    command: -redis.addr redis://:${REDIS_PASSWORD}@vr-redis:6379
    ports:
      - "9121:9121"
    networks:
      - vr-network

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: vr-postgres-exporter
    environment:
      DATA_SOURCE_URI: "vr-postgres:5432/vietrecruit?sslmode=disable"
      DATA_SOURCE_USER: ${POSTGRES_USER}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD}
    networks:
      - vr-network
    ports:
      - "9187:9187"

  elasticsearch:
    build:
      context: ./elk
      dockerfile: elasticsearch.Dockerfile
    image: vr-elasticsearch:8.17.0
    container_name: vr-elasticsearch
    volumes:
      - ./elk/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - ES_JAVA_OPTS=-Xms2g -Xmx4g
      - discovery.type=single-node
    networks:
      - vr-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  loki:
    image: grafana/loki:2.9.4
    container_name: vr-loki
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - vr-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: vr-kibana
    volumes:
      - ./elk/kibana.yml:/usr/share/kibana/config/kibana.yml
    ports:
      - "5601:5601"
    networks:
      - vr-network
    depends_on:
      - elasticsearch

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: vr-kafka-exporter
    command:
      - --kafka.server=vr-kafka:9092
    ports:
      - "9308:9308"
    networks:
      - vr-network
    restart: on-failure

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:latest
    container_name: vr-elasticsearch-exporter
    command:
      - --es.uri=http://vr-elasticsearch:9200
    ports:
      - "9114:9114"
    networks:
      - vr-network

volumes:
  db:
  kafka_data:
  loki-data:


networks:
  vr-network:
    driver: bridge
