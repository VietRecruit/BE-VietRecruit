services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: prod
        APP_VERSION: ${DOCKER_APP_VERSION:-0.0.1}
    image: ${DOCKER_USERNAME}/vietrecruit:${DOCKER_APP_VERSION:-latest}
    container_name: vr-app
    ports:
      - "8080:8080"
    networks:
      - vr-network
    environment:
      ACTIVE_PROFILE: prod
      POSTGRES_URL: jdbc:postgresql://vr-postgres:5432/vietrecruit
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: vr-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL}
      JWT_ISSUER: ${JWT_ISSUER}
      SERVER_PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: vr-kafka:9092
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  db:
    image: pgvector/pgvector:pg16
    container_name: vr-postgres
    environment:
      POSTGRES_DB: vietrecruit
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "max_replication_slots=4"
    ports: [ "5432:5432" ]
    networks:
      - vr-network
    volumes: [ "db:/var/lib/postgresql/data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d vietrecruit" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: vr-redis
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    networks:
      - vr-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: vr-kafka
    ports:
      - "29092:29092"
    networks:
      - vr-network
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@vr-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://vr-kafka:9092,CONTROLLER://vr-kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://vr-kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 'VlJDbHVzdGVySWQxMjM0NQ'
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  debezium-kafka-connect:
    image: debezium/connect:2.5
    container_name: vr-debezium-connect
    ports:
      - "127.0.0.1:8083:8083"
      - "127.0.0.1:8778:8778"
    networks:
      - vr-network
    environment:
      BOOTSTRAP_SERVERS: vr-kafka:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      ENABLE_JOLOKIA: "true"
    depends_on:
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G

  debezium-ui:
    image: debezium/debezium-ui:2.5
    container_name: vr-debezium-ui
    hostname: debezium-ui
    ports:
      - "127.0.0.1:8085:8080"
    networks:
      - vr-network
    environment:
      KAFKA_CONNECT_URIS: http://vr-debezium-connect:8083
    depends_on:
      - debezium-kafka-connect

  init-kafka-connect:
    build:
      context: ./debezium
    image: vr-init-connector:latest
    container_name: vr-init-kafka-connect
    networks:
      - vr-network
    environment:
      KAFKA_CONNECT_URL: http://vr-debezium-connect:8083
      CONNECTOR_CONFIG: /config/connector-postgres.json
      MAX_RETRIES: 60
      RETRY_INTERVAL: 5
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vietrecruit

    depends_on:
      debezium-kafka-connect:
        condition: service_healthy
    restart: "no"

  prometheus:
    image: prom/prometheus:latest
    container_name: vr-prometheus
    user: root
    restart: unless-stopped
    volumes:
      - ./monitor/prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "9091:9090"
    networks:
      - vr-network
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana
    container_name: vr-grafana
    user: root
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SING_UP=false
      - GF_SERVER_DOMAIN=localhost
    volumes:
      - ./grafana-storage:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - vr-network
    deploy:
      resources:
        limits:
          memory: 256M

  node-exporter:
    image: prom/node-exporter:latest
    container_name: vr-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"
    networks:
      - vr-network

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: vr-redis-exporter
    command: -redis.addr redis://:${REDIS_PASSWORD}@vr-redis:6379
    ports:
      - "9121:9121"
    networks:
      - vr-network

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: vr-postgres-exporter
    environment:
      DATA_SOURCE_URI: "vr-postgres:5432/vietrecruit?sslmode=disable"
      DATA_SOURCE_USER: ${POSTGRES_USER}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD}
    networks:
      - vr-network
    ports:
      - "9187:9187"

  elasticsearch:
    image: elasticsearch:7.17.25
    container_name: vr-elasticsearch
    volumes:
      - ./elk/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - ES_JAVA_OPTS=-Xmx1g -Xms1g
      - discovery.type=single-node
    networks:
      - vr-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  logstash:
    image: logstash:7.17.25
    container_name: vr-logstash
    volumes:
      - ./elk/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./elk/pipeline:/usr/share/logstash/pipeline
    ports:
      - "5044:5044"
      - "5033:5000/tcp"
      - "5022:5000/udp"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    networks:
      - vr-network
    depends_on:
      - elasticsearch

  kibana:
    image: kibana:7.17.25
    container_name: vr-kibana
    volumes:
      - ./elk/kibana.yml:/usr/share/kibana/config/kibana.yml
    ports:
      - "5601:5601"
    networks:
      - vr-network
    depends_on:
      - elasticsearch

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vr-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - vr-network
    volumes:
      - qdrant_data:/qdrant/storage

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: vr-kafka-exporter
    command:
      - --kafka.server=vr-kafka:9092
    ports:
      - "9308:9308"
    networks:
      - vr-network
    restart: on-failure

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:latest
    container_name: vr-elasticsearch-exporter
    command:
      - --es.uri=http://vr-elasticsearch:9200
    ports:
      - "9114:9114"
    networks:
      - vr-network

volumes:
  db:
  kafka_data:
  qdrant_data:


networks:
  vr-network:
    driver: bridge
