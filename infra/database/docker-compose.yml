services:
  db:
    image: pgvector/pgvector:pg16
    container_name: vr-postgres
    environment:
      POSTGRES_DB: vietrecruit
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "max_replication_slots=4"
    ports: [ "5432:5432" ]
    networks:
      - vr-network
    volumes: [ "db:/var/lib/postgresql/data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d vietrecruit" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: vr-redis
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    networks:
      - vr-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vr-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - vr-network
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  db:
  qdrant_data:


networks:
  vr-network:
    driver: bridge
