services:
  prometheus:
    image: prom/prometheus:latest
    container_name: vr-prometheus
    user: root
    restart: unless-stopped
    volumes:
      - ./monitor/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../data/data/prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "9091:9090"
    networks:
      - vr-network

  grafana:
    image: grafana/grafana
    container_name: vr-grafana
    user: root
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SING_UP=false
      - GF_SERVER_DOMAIN=localhost
      - GF_LOG_MODE=console file
    volumes:
      - ./grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - vr-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: vr-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"
    networks:
      - vr-network

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: vr-redis-exporter
    command: -redis.addr redis://:${REDIS_PASSWORD}@vr-redis:6379
    ports:
      - "9121:9121"
    networks:
      - vr-network

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: vr-postgres-exporter
    environment:
      DATA_SOURCE_URI: "vr-postgres:5432/vietrecruit?sslmode=disable"
      DATA_SOURCE_USER: ${POSTGRES_USER}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD}
    networks:
      - vr-network
    ports:
      - "9187:9187"

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: vr-kafka-exporter
    command:
      - --kafka.server=vr-kafka:9092
    ports:
      - "9308:9308"
    networks:
      - vr-network
    restart: on-failure

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:latest
    container_name: vr-elasticsearch-exporter
    command:
      - --es.uri=http://vr-elasticsearch:9200
    ports:
      - "9114:9114"
    networks:
      - vr-network

  kafka-ui:
    container_name: vr-kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - 8090:8080
    networks:
      - vr-network
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: vr-kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://vr-debezium-connect:8083
    depends_on:
      - kafka
      - debezium-kafka-connect

  debezium-ui:
    image: debezium/debezium-ui:2.5
    container_name: vr-debezium-ui
    ports:
      - "8084:8080"
    networks:
      - vr-network
    environment:
      KAFKA_CONNECT_URIS: http://vr-debezium-connect:8083
    depends_on:
      - debezium-kafka-connect

  loki:
    image: grafana/loki:2.9.4
    container_name: vr-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - vr-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: vr-kibana
    volumes:
      - ../application/elastic/kibana.yml:/usr/share/kibana/config/kibana.yml
    ports:
      - "5601:5601"
    networks:
      - vr-network
    depends_on:
      - elasticsearch

volumes:
  loki-data:


networks:
  vr-network:
    driver: bridge
