global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "vr-prometheus"
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: "/metrics"

  - job_name: "vr-springboot"
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: "/actuator/prometheus"

  - job_name: "vr-node-exporter"
    scrape_interval: 5s
    static_configs:
      - targets: [ "vr-node-exporter:9100" ]

  - job_name: "vr-redis-exporter"
    scrape_interval: 5s
    static_configs:
      - targets: [ "vr-redis-exporter:9121" ]
    metrics_path: "/metrics"

  - job_name: "vr-postgres-exporter"
    scrape_interval: 5s
    static_configs:
      - targets: [ "vr-postgres-exporter:9187" ]
    metrics_path: "/metrics"
