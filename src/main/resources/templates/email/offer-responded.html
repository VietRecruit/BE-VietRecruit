<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Offer Response</title>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
    <div style="background: linear-gradient(135deg, #1a73e8, #4285f4); padding: 24px; border-radius: 8px 8px 0 0;">
        <h1 style="color: #fff; margin: 0; font-size: 22px;">Offer Response Received</h1>
    </div>
    <div style="background: #fff; border: 1px solid #e0e0e0; border-top: none; padding: 24px; border-radius: 0 0 8px 8px;">
        <p>Hi <span th:text="${hrName}">HR Manager</span>,</p>
        <p><strong th:text="${candidateName}">Candidate</strong> has <strong th:text="${action}">responded to</strong> the offer for:</p>
        <div style="background: #f8f9fa; border-left: 4px solid #1a73e8; padding: 12px 16px; margin: 16px 0; border-radius: 0 4px 4px 0;">
            <strong th:text="${jobTitle}">Job Title</strong>
        </div>
        <p>Please check your VietRecruit dashboard for more details.</p>
        <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 20px 0;" />
        <p style="font-size: 12px; color: #888;">This is an automated notification from VietRecruit.</p>
    </div>
</body>
</html>
