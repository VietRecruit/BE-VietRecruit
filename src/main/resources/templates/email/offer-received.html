<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Offer Received</title>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
    <div style="background: linear-gradient(135deg, #2e7d32, #43a047); padding: 24px; border-radius: 8px 8px 0 0;">
        <h1 style="color: #fff; margin: 0; font-size: 22px;">You Have Received an Offer!</h1>
    </div>
    <div style="background: #fff; border: 1px solid #e0e0e0; border-top: none; padding: 24px; border-radius: 0 0 8px 8px;">
        <p>Hi <span th:text="${candidateName}">Candidate</span>,</p>
        <p>Congratulations! You have received an offer for the position of <strong th:text="${jobTitle}">Job Title</strong>.</p>
        <div style="background: #f1f8e9; border-left: 4px solid #2e7d32; padding: 12px 16px; margin: 16px 0; border-radius: 0 4px 4px 0;">
            <span style="font-size: 14px; color: #666;">Base Salary:</span><br/>
            <strong style="font-size: 18px;"><span th:text="${baseSalary}">0</span> <span th:text="${currency}">VND</span></strong>
        </div>
        <p>Please review the offer details and respond through your VietRecruit account.</p>
        <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 20px 0;" />
        <p style="font-size: 12px; color: #888;">This is an automated notification from VietRecruit.</p>
    </div>
</body>
</html>
