resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        permittedNumberOfCallsInHalfOpenState: 3
        eventConsumerBufferSize: 10
        registerHealthIndicator: true

  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1s
        exponentialBackoffMultiplier: 2
        enableExponentialBackoff: true

  ratelimiter:
    instances:
      authStrict:
        limitForPeriod: 20
        limitRefreshPeriod: 60s
        timeoutDuration: 0
        registerHealthIndicator: true
      authModerate:
        limitForPeriod: 30
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
        registerHealthIndicator: true

      swagger:
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
        registerHealthIndicator: true

      lowTraffic:
        limitForPeriod: 10
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true
      mediumTraffic:
        limitForPeriod: 20
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true
      highTraffic:
        limitForPeriod: 30
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true
