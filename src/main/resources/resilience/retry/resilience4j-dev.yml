resilience4j:
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1s
        exponentialBackoffMultiplier: 2
        enableExponentialBackoff: true
      resendApi:
        maxAttempts: 3
        waitDuration: 1s
        exponentialBackoffMultiplier: 2
        enableExponentialBackoff: true
        retryExceptions:
          - java.lang.RuntimeException
      r2Upload:
        maxAttempts: 2
        waitDuration: 500ms
        exponentialBackoffMultiplier: 2
        enableExponentialBackoff: true
        retryExceptions:
          - software.amazon.awssdk.core.exception.SdkException