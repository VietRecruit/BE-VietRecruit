resilience4j:
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 2s
        exponentialBackoffMultiplier: 2
        enableExponentialBackoff: true
      resendApi:
        maxAttempts: 3
        waitDuration: 2s
        exponentialBackoffMultiplier: 2
        enableExponentialBackoff: true
        retryExceptions:
          - java.lang.RuntimeException
      r2Storage:
        maxAttempts: 3
        waitDuration: 1s
        exponentialBackoffMultiplier: 2
        enableExponentialBackoff: true
        retryExceptions:
          - software.amazon.awssdk.core.exception.SdkClientException
          - software.amazon.awssdk.core.exception.SdkServiceException
        ignoreExceptions:
          - com.vietrecruit.common.exception.ApiException