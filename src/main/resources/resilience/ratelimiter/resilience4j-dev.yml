resilience4j:

  ratelimiter:
    instances:
      # Auth
      authStrict:
        limitForPeriod: 20
        limitRefreshPeriod: 60s
        timeoutDuration: 0
        registerHealthIndicator: true
      authModerate:
        limitForPeriod: 30
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
        registerHealthIndicator: true

      # OpenAPI
      swagger:
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
        registerHealthIndicator: true

      # Base
      lowTraffic:
        limitForPeriod: 10
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true
      mediumTraffic:
        limitForPeriod: 20
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true
      highTraffic:
        limitForPeriod: 30
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true