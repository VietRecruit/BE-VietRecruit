resilience4j:
  ratelimiter:
    instances:
      # Auth
      authStrict:
        limitForPeriod: 10
        limitRefreshPeriod: 60s
        timeoutDuration: 0
        registerHealthIndicator: true
      authModerate:
        limitForPeriod: 20
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
        registerHealthIndicator: true

      # OpenAPI
      swagger:
        limitForPeriod: 50
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
        registerHealthIndicator: true

      # Base
      lowTraffic:
        limitForPeriod: 5
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true
      mediumTraffic:
        limitForPeriod: 15
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true
      highTraffic:
        limitForPeriod: 25
        limitRefreshPeriod: 30s
        timeoutDuration: 5s
        registerHealthIndicator: true