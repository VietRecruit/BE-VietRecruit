spring:
  application:
    name: VietRecruit
    frontend-url: ${FRONTEND_BASE_URL}
  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  flyway:
    enabled: true
    out-of-order: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:2}
          max-wait: ${REDIS_POOL_MAX_WAIT:2000ms}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid, email, profile
            redirect-uri: "{baseUrl}/vietrecruit/auth/oauth2/callback/google"
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: user:email, read:user
            redirect-uri: "{baseUrl}/vietrecruit/auth/oauth2/callback/github"
        provider:
          github:
            user-name-attribute: login
  elasticsearch:
    uris: ${ELASTICSEARCH_URI}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: ${OPENAI_CHAT_MODEL}
      embedding:
        model: ${OPENAI_EMBEDDING_MODEL}
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1536
        similarity-threshold: 0.7
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

ai:
  knowledge:
    chunk:
      min-tokens: 100
      max-tokens: 800
    supported-categories:
      - cv-guide
      - interview-guide
      - salary-data
      - job-taxonomy
      - industry-overview
      - jd-template
  jd:
    model: gpt-4o
    temperature: 0.5

cloudflare:
  r2:
    endpoint: ${R2_ENDPOINT}
    bucket: ${R2_BUCKET}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    public-url: ${R2_PUBLIC_URL}

resend:
  api-key: ${RESEND_API_KEY}
  domain: vietrecruit.site

vietrecruit:
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}

management:
  health:
    circuitbreakers:
      enabled: true
    probes:
      enabled: true
  endpoint:
    health:
      show-details: when_authorized
      group:
        readiness:
          include: readinessState,elasticsearchPopulation
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, prometheus

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  issuer: vietrecruit
  audience: vietrecruit-api

payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECKSUM_KEY}
  log-level: ${PAYOS_LOG_LEVEL}
  return-url: ${PAYOS_RETURN_URL}
  cancel-url: ${PAYOS_CANCEL_URL}
