debug: false

spring:
  config:
    import:
      - classpath:resilience/circuitbreaker/resilience4j-prod.yml
      - classpath:resilience/ratelimiter/resilience4j-prod.yml
      - classpath:resilience/retry/resilience4j-prod.yml

jpa:
  hibernate:
    ddl-auto: validate
  show-sql: false

security:
  jwt:
    secret: ${JWT_SECRET}
    access-ttl: ${ACCESS_TOKEN_TTL}
    refresh-ttl: ${REFRESH_TOKEN_TTL}
    issuer: ${JWT_ISSUER}

app:
  base-url: ${APP_BASE_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

springdoc:
  swagger-ui:
    path: /vietrecruit/api-docs
    config-url: /vietrecruit/v3/api-docs/swagger-config
    url: /vietrecruit/v3/api-docs
  api-docs:
    path: /vietrecruit/v3/api-docs
  server-url: ${APP_BASE_URL}

server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        same-site: none
        secure: true
        http-only: true
