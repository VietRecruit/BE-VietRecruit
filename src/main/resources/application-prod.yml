debug: false

spring:
  config:
    import:
      - classpath:resilience/circuitbreaker/resilience4j-prod.yml
      - classpath:resilience/ratelimiter/resilience4j-prod.yml
      - classpath:resilience/retry/resilience4j-prod.yml
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL}
          temperature: 0.2
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL}
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 1536
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        table-name: ai_vector_store

jpa:
  hibernate:
    ddl-auto: validate
  show-sql: false

security:
  jwt:
    secret: ${JWT_SECRET}
    access-ttl: ${ACCESS_TOKEN_TTL}
    refresh-ttl: ${REFRESH_TOKEN_TTL}
    issuer: ${JWT_ISSUER}

app:
  base-url: ${APP_BASE_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        same-site: lax
        secure: true
        http-only: true

