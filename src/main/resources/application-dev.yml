spring:
  config:
    import:
      - classpath:resilience/circuitbreaker/resilience4j-dev.yml
      - classpath:resilience/ratelimiter/resilience4j-dev.yml
      - classpath:resilience/retry/resilience4j-dev.yml
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL}
          temperature: 0.2
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL}
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 1536
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        table-name: ai_vector_store

jpa:
  hibernate:
    ddl-auto: validate
  show-sql: true
  properties:
    hibernate:
      format_sql: true
      use_sql_comments: true

security:
  jwt:
    secret: ${JWT_SECRET}
    access-ttl: ${ACCESS_TOKEN_TTL:PT15M}
    refresh-ttl: ${REFRESH_TOKEN_TTL:P30D}
    issuer: ${JWT_ISSUER}

app:
  base-url: ${APP_BASE_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

springdoc:
  swagger-ui:
    path: /vietrecruit/api-docs
    config-url: /vietrecruit/v3/api-docs/swagger-config
    url: /vietrecruit/v3/api-docs
  api-docs:
    path: /vietrecruit/v3/api-docs
  server-url: ${APP_BASE_URL:http://localhost:8080}

